name: CI & Self-Healing

on:
  pull_request:
    branches: 
      - main
      - 'fix/autoheal-*' 
  push:
    branches: 
      - main
      - 'fix/autoheal-*'
    paths-ignore:
      - "kubernetes/**"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: codebyafroj
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 🧱 STEP 1: Always run tests on all branches (main + AI fix branches)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        app: [client, server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}
      - name: Run tests
        run: npm run test --if-present
        working-directory: ${{ matrix.app }}

  # 🐳 STEP 2: Basic build check for Pull Requests
  docker-build-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t frontend ./client
      - name: Build backend image
        run: docker build -t backend ./server

  # 🚀 STEP 3: Push images ONLY when code hits the 'main' branch
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: client
          file: client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/frontend:latest
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/backend:latest

  # ☸️ STEP 4: Update K8s ONLY when code hits the 'main' branch
  update-k8s:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update frontend image tag
        run: |
          sed -i "s|image: ghcr.io/${{ env.OWNER }}/frontend:.*|image: ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}|" kubernetes/frontend-deployment.yaml
      - name: Update backend image tag
        run: |
          sed -i "s|image: ghcr.io/${{ env.OWNER }}/backend:.*|image: ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}|" kubernetes/backend-deployment.yaml
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add kubernetes/frontend-deployment.yaml kubernetes/backend-deployment.yaml
          git commit -m "Deploy frontend & backend images ($IMAGE_TAG)" || echo "No changes to commit"
      - name: Pull latest branch state
        run: git pull --rebase origin main
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
