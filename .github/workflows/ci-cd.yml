name: fullstack pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: deployment
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: codebyafroj
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        app: [client, server]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - run: npm ci
        working-directory: ${{ matrix.app }}

      - run: npm run test --if-present
        working-directory: ${{ matrix.app }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: client
          file: client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Update frontend image tag
        run: |
          sed -i \
          "s|image: ghcr.io/${{ env.OWNER }}/frontend:.*|image: ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}|" \
          kubernetes/frontend-deployment.yaml

      - name: Update backend image tag
        run: |
          sed -i \
          "s|image: ghcr.io/${{ env.OWNER }}/backend:.*|image: ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}|" \
          kubernetes/backend-deployment.yaml

      - name: Commit & Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
