```yaml
name: fullstack pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]
    paths-ignore:
      - "kubernetes/**"

permissions:
  contents: write
  packages: write

concurrency:
  group: deployment
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: codebyafroj
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        app: [client, server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Run tests
        run: npm run test --if-present
        working-directory: ${{ matrix.app }}

  docker-build-check:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image (PR validation)
        run: docker build -t frontend ./client

      - name: Build backend image (PR validation)
        run: docker build -t backend ./server

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: client
          file: client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-k8s:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update frontend image tag
        run: |
          sed -i "s|image: ghcr.io/${{ env.OWNER }}/frontend:.*|image: ghcr.io/${{ env.OWNER }}/frontend:${{ env.IMAGE_TAG }}|" kubernetes/frontend-deployment.yaml

      - name: Update backend image tag
        run: |
          sed -i "s|image: ghcr.io/${{ env.OWNER }}/backend:.*|image: ghcr.io/${{ env.OWNER }}/backend:${{ env.IMAGE_TAG }}|" kubernetes/backend-deployment.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "ci@github.com"
          git add kubernetes/frontend-deployment.yaml kubernetes/backend-deployment.yaml
          git commit -m "Deploy frontend & backend images ($IMAGE_TAG)" || echo "No changes to commit"

      - name: Pull latest branch state
        run: git pull --rebase origin main

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
```
